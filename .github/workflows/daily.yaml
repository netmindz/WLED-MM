name: 'Daily build'
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: # TODO: remove before merge


jobs:

  wled_build:
    uses: ./.github/workflows/build.yml
    
  nightly:
    name: Deploy nightly
    steps:
      - name: Deploy release
        uses: WebFreak001/deploy-nightly@v3.1.0
        with:
          upload_url: https://uploads.github.com/repos/netmindz/WLED/releases/187121669/assets{?name,label} # find out this value by opening https://api.github.com/repos/<owner>/<repo>/releases in your browser and copy the full "upload_url" value including the {?name,label} part
          release_id: 187121669 # same as above (id can just be taken out the upload_url, it's used to find old releases)
          asset_path: ./myapp.zip # path to archive to upload
          asset_name: myapp_windows-nightly-$$.zip # name to upload the release as, use $$ to insert date (YYYYMMDD) and 6 letter commit hash
          asset_content_type: application/zip # required by GitHub API
          max_releases: 7 # optional, if there are more releases than this matching the asset_name, the oldest ones are going to be deleted

