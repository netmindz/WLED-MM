name: End-to-End Testing with QEMU

on:
  push:
    branches: [ mdev, main ]
  pull_request:
    branches: [ mdev, main ]
  workflow_dispatch:

jobs:
  e2e-test:
    name: E2E Tests with ESP32 Emulation
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-e2e-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-e2e-
          
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install PlatformIO
      run: pip install -r requirements.txt
      
    - name: Install Node.js dependencies
      run: npm ci
      
    - name: Build Web UI
      run: npm run build
      
    - name: Build firmware for ESP32 (basic build for testing)
      env:
        WLED_RELEASE: True
      run: |
        # Build a simple ESP32 environment for testing
        # Using esp32dev_compat as it's a basic ESP32 build
        pio run -e esp32dev_compat
        
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Set up Wokwi CLI for ESP32 simulation
      run: |
        curl -L https://wokwi.com/ci/install.sh | sh
        echo "$HOME/.wokwi/bin" >> $GITHUB_PATH
        
    - name: Create Wokwi project configuration
      run: |
        cat > wokwi.toml << 'EOF'
        [wokwi]
        version = 1
        elf = ".pio/build/esp32dev_compat/firmware.elf"
        firmware = ".pio/build/esp32dev_compat/firmware.bin"
        
        [[net.forward]]
        host = "0.0.0.0"
        guest = 80
        port = 8180
        EOF
        
    - name: Create diagram.json for Wokwi
      run: |
        cat > diagram.json << 'EOF'
        {
          "version": 1,
          "author": "WLED CI/CD",
          "editor": "wokwi",
          "parts": [
            { "type": "wokwi-esp32-devkit-v1", "id": "esp", "top": 0, "left": 0, "attrs": {} }
          ],
          "connections": [],
          "dependencies": {}
        }
        EOF
        
    - name: Start ESP32 simulator
      run: |
        # Start Wokwi simulator in background
        wokwi-cli --timeout 300000 --expect-text "WLED" . &
        WOKWI_PID=$!
        echo "WOKWI_PID=$WOKWI_PID" >> $GITHUB_ENV
        
        # Wait for the web server to be ready
        echo "Waiting for WLED web server to start..."
        for i in {1..60}; do
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:8180/ | grep -q "200\|301\|302"; then
            echo "WLED web server is ready!"
            curl -v http://localhost:8180/ || true
            break
          fi
          echo "Attempt $i: Waiting for web server..."
          sleep 5
        done
        
        # Verify server is actually responding
        if ! curl -s http://localhost:8180/ > /dev/null 2>&1; then
          echo "Error: Web server not responding after waiting"
          exit 1
        fi
        
    - name: Run Playwright tests
      env:
        WLED_URL: http://localhost:8180
      run: |
        npx playwright test --reporter=html
        
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
        
    - name: Stop simulator
      if: always()
      run: |
        if [ ! -z "$WOKWI_PID" ]; then
          kill $WOKWI_PID || true
        fi
